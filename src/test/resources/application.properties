# Use H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:alunos-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop schema for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Reduce logging noise in CI
logging.level.org.springframework=INFO
logging.level.com.chamada_juninho=INFO

